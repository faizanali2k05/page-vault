<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UXRay</title>
<style>
  /* Palette pulled straight from icon.svg:
     tile gradient #0f766e -> #164e63, paper #fffdf8 -> #e7eefc, blue accent #2563eb */
  :root {
    --bg: #f4f1ea;
    --panel: #fffdf8;
    --surface: #faf7f0;
    --line: #ddd8cb;
    --ink: #15211f;
    --muted: #6b7773;

    --teal: #0f766e;
    --teal-deep: #164e63;
    --teal-ink: #0b4f4a;
    --teal-soft: #dff3ef;
    --blue: #2563eb;
    --blue-soft: #e7eefc;
    --amber: #b45309;
    --red: #b42318;
    --red-soft: #fbe6e4;
    --green: #0f766e;

    --sans: 'Outfit', 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: ui-monospace, "SFMono-Regular", Consolas, Menlo, monospace;
    --shadow: 0 10px 26px rgba(22, 78, 99, 0.12);
  }

  * { box-sizing: border-box; }

  html, body {
    width: 360px;
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font: 13px/1.45 var(--sans);
  }
  body { padding: 16px; }

  header {
    display: grid;
    grid-template-columns: 38px 1fr;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .logo {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--teal), var(--teal-deep));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 14px rgba(15, 118, 110, 0.28);
  }
  .logo svg { width: 21px; height: 21px; color: #fff; }
  .brand h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: var(--teal-deep);
  }
  .brand h1 b { color: var(--blue); font-weight: 800; }
  .brand p {
    margin: 1px 0 0;
    color: var(--muted);
    font-size: 11px;
  }

  .target {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--teal-soft);
    border: 1px solid #c4e6df;
    border-radius: 9px;
    padding: 8px 11px;
    margin-bottom: 14px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.18);
    flex: none;
  }
  #pageLabel {
    color: var(--teal-ink);
    font: 11px var(--mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .scope {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 11px;
    padding: 12px 14px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .scope .label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 8px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 11px;
    color: var(--teal-ink);
    background: var(--teal-soft);
    border: 1px solid #c4e6df;
    border-radius: 6px;
    padding: 3px 8px;
  }

  .analyze-btn {
    width: 100%;
    height: 44px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--teal), var(--teal-deep));
    color: #fff;
    cursor: pointer;
    font: 600 14px var(--sans);
    box-shadow: 0 8px 18px rgba(15, 118, 110, 0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    transition: all 160ms;
  }
  .analyze-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 10px 22px rgba(15, 118, 110, 0.36);
  }
  .analyze-btn:disabled {
    background: #e7e3d8;
    color: var(--muted);
    box-shadow: none;
    cursor: not-allowed;
  }
  .analyze-btn svg { width: 17px; height: 17px; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status {
    margin-top: 12px;
    min-height: 16px;
    text-align: center;
    font: 11px var(--mono);
    color: var(--muted);
  }
  .status.error { color: var(--red); }
  .status.done { color: var(--teal); }

  .result {
    margin-top: 12px;
    display: none;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--surface);
    padding: 12px;
  }
  .result.show { display: block; }
  .result h3 {
    margin: 0 0 8px;
    font-size: 12px;
    color: var(--teal-deep);
    display: flex; align-items: center; gap: 6px;
  }
  .result .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 7px;
  }
  .result .cell {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 7px 9px;
  }
  .result .cell b { display: block; font-size: 15px; color: var(--teal-deep); }
  .result .cell span { font-size: 10px; color: var(--muted); }
  .result .file {
    margin-top: 9px;
    font: 10px var(--mono);
    color: var(--muted);
    word-break: break-all;
  }

  .download-btn {
    width: 100%;
    height: 40px;
    margin-top: 10px;
    border: none;
    border-radius: 9px;
    background: var(--blue);
    color: #fff;
    cursor: pointer;
    font: 600 13px var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 6px 14px rgba(37, 99, 235, 0.25);
    transition: all 150ms;
  }
  .download-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(37, 99, 235, 0.34);
  }
  .download-btn:disabled { opacity: 0.6; cursor: default; }
  .download-btn svg { width: 16px; height: 16px; }
  .download-btn.saved { background: var(--teal); box-shadow: none; }

  #openDownloads {
    width: 100%;
    height: 32px;
    margin-top: 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font: 500 11px var(--sans);
    display: none;
  }
  #openDownloads.show { display: block; }
  #openDownloads:hover { background: var(--panel); color: var(--ink); }

  footer {
    margin-top: 14px;
    text-align: center;
    color: var(--muted);
    font: 10px var(--mono);
  }
</style>
</head>
<body>
  <header>
    <div class="logo">
      <svg fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
        <line x1="11" y1="7.5" x2="11" y2="14.5"></line>
        <line x1="7.5" y1="11" x2="14.5" y2="11"></line>
      </svg>
    </div>
    <div class="brand">
      <h1>U<b>X</b>Ray</h1>
      <p>X-ray this page's UI/UX into a report</p>
    </div>
  </header>

  <div class="target">
    <div class="dot"></div>
    <div id="pageLabel">Checking active tab...</div>
  </div>

  <div class="scope">
    <div class="label">Report includes</div>
    <div class="chips">
      <span class="chip">Colors</span>
      <span class="chip">Typography</span>
      <span class="chip">Spacing</span>
      <span class="chip">Components</span>
      <span class="chip">Layout</span>
      <span class="chip">Design tokens</span>
      <span class="chip">Responsive</span>
      <span class="chip">Accessibility</span>
    </div>
  </div>

  <button id="analyze" class="analyze-btn" type="button">
    <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
    </svg>
    Analyze UI/UX
  </button>

  <div id="status" class="status"></div>

  <div id="result" class="result">
    <h3>✓ Report ready</h3>
    <div class="grid">
      <div class="cell"><b id="rElements">0</b><span>Elements scanned</span></div>
      <div class="cell"><b id="rComponents">0</b><span>Components</span></div>
      <div class="cell"><b id="rTokens">0</b><span>Design tokens</span></div>
      <div class="cell"><b id="rBreakpoints">0</b><span>Breakpoints</span></div>
    </div>
    <div id="resultFile" class="file"></div>

    <button id="download" class="download-btn" type="button">
      <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      Download .md report
    </button>
    <button id="openDownloads" type="button">Open Downloads folder</button>
  </div>

  <footer>Nothing is saved until you click Download</footer>

  <script src="popup.js"></script>
</body>
</html>
